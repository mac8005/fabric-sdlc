<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13">
  <style>
    @keyframes typeText { from { opacity: 0; } to { opacity: 1; } }
    @keyframes cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes progressBar { from { width: 0; } to { width: 100%; } }
    .terminal-bg { fill: #1a1b26; }
    .terminal-header { fill: #24283b; }
    .prompt { fill: #7aa2f7; }
    .command { fill: #c0caf5; }
    .agent-name { fill: #bb9af7; font-weight: bold; }
    .phase-label { fill: #7dcfff; }
    .status-done { fill: #9ece6a; }
    .status-active { fill: #ff9e64; }
    .dim { fill: #565f89; }
    .file-path { fill: #73daca; }
    .separator { fill: #3b4261; }
    .title-bar-btn-r { fill: #f7768e; }
    .title-bar-btn-y { fill: #e0af68; }
    .title-bar-btn-g { fill: #9ece6a; }

    .line1 { animation: fadeIn 0.3s ease-out 0.5s both; }
    .line2 { animation: fadeIn 0.3s ease-out 1.2s both; }
    .line3 { animation: fadeIn 0.3s ease-out 2.0s both; }
    .line4 { animation: fadeIn 0.3s ease-out 2.8s both; }
    .line5 { animation: fadeIn 0.3s ease-out 3.5s both; }
    .line6 { animation: fadeIn 0.3s ease-out 4.2s both; }
    .line7 { animation: fadeIn 0.3s ease-out 4.9s both; }
    .line8 { animation: fadeIn 0.3s ease-out 5.6s both; }
    .line9 { animation: fadeIn 0.3s ease-out 6.3s both; }
    .line10 { animation: fadeIn 0.3s ease-out 7.0s both; }
    .line11 { animation: fadeIn 0.3s ease-out 7.7s both; }
    .line12 { animation: fadeIn 0.3s ease-out 8.4s both; }
    .line13 { animation: fadeIn 0.3s ease-out 9.1s both; }
    .line14 { animation: fadeIn 0.3s ease-out 9.8s both; }
    .line15 { animation: fadeIn 0.3s ease-out 10.5s both; }
    .line16 { animation: fadeIn 0.3s ease-out 11.2s both; }
    .line17 { animation: fadeIn 0.3s ease-out 11.9s both; }
    .line18 { animation: fadeIn 0.3s ease-out 12.6s both; }
    .line19 { animation: fadeIn 0.3s ease-out 13.3s both; }
  </style>

  <!-- Terminal window -->
  <rect class="terminal-bg" width="800" height="520" rx="10"/>
  <rect class="terminal-header" width="800" height="32" rx="10"/>
  <rect class="terminal-bg" y="22" width="800" height="12"/>
  <circle class="title-bar-btn-r" cx="20" cy="16" r="6"/>
  <circle class="title-bar-btn-y" cx="40" cy="16" r="6"/>
  <circle class="title-bar-btn-g" cx="60" cy="16" r="6"/>
  <text x="400" y="20" fill="#a9b1d6" text-anchor="middle" font-size="12">claude — fabric-sdlc</text>

  <!-- Command prompt -->
  <g class="line1">
    <text x="20" y="60" class="prompt">$</text>
    <text x="35" y="60" class="command">/fabric Build me a task management API with auth and teams</text>
  </g>

  <!-- Phase 0 -->
  <g class="line2">
    <text x="20" y="85" class="dim">───────────────────────────────────────────────────────────</text>
  </g>
  <g class="line3">
    <text x="20" y="105" class="agent-name">fabric-pm</text>
    <text x="110" y="105" class="phase-label">Phase 0: Project Initiation</text>
    <text x="380" y="105" class="status-done">Done</text>
  </g>

  <!-- Phase 1 -->
  <g class="line4">
    <text x="20" y="130" class="agent-name">fabric-ba</text>
    <text x="110" y="130" class="phase-label">Phase 1: Requirements Analysis</text>
    <text x="380" y="130" class="status-done">Done</text>
    <text x="420" y="130" class="dim">→ 12 requirements, 8 user stories</text>
  </g>

  <!-- Phase 2 -->
  <g class="line5">
    <text x="20" y="155" class="agent-name">fabric-architect</text>
    <text x="158" y="155" class="phase-label">Phase 2a: Architecture</text>
    <text x="380" y="155" class="status-done">Done</text>
    <text x="420" y="155" class="dim">→ REST API, PostgreSQL, Node.js</text>
  </g>
  <g class="line6">
    <text x="20" y="175" class="agent-name">fabric-ux</text>
    <text x="110" y="175" class="phase-label">Phase 2b: UX Design</text>
    <text x="380" y="175" class="status-done">Done</text>
    <text x="420" y="175" class="dim">→ 6 screens, design system</text>
  </g>
  <g class="line7">
    <text x="380" y="175" class="dim" font-size="10">                              ▲ parallel</text>
  </g>

  <!-- Phase 3 -->
  <g class="line8">
    <text x="20" y="200" class="agent-name">fabric-dev-lead</text>
    <text x="158" y="200" class="phase-label">Phase 3: Implementation</text>
    <text x="380" y="200" class="status-done">Done</text>
    <text x="420" y="200" class="dim">→ 24 files, 3 sub-agents</text>
  </g>

  <!-- Phase 4 -->
  <g class="line9">
    <text x="20" y="225" class="agent-name">fabric-qa</text>
    <text x="110" y="225" class="phase-label">Phase 4a: Testing</text>
    <text x="380" y="225" class="status-done">Done</text>
    <text x="420" y="225" class="dim">→ 47 tests (unit+e2e+playwright)</text>
  </g>
  <g class="line10">
    <text x="20" y="245" class="agent-name">fabric-security</text>
    <text x="158" y="245" class="phase-label">Phase 4b: Security Review</text>
    <text x="380" y="245" class="status-done">Done</text>
    <text x="420" y="245" class="dim">→ STRIDE + OWASP, 2 findings</text>
  </g>
  <g class="line11">
    <text x="380" y="245" class="dim" font-size="10">                              ▲ parallel</text>
  </g>

  <!-- Phase 4-fix -->
  <g class="line12">
    <text x="20" y="270" class="agent-name">fabric-dev-lead</text>
    <text x="158" y="270" class="phase-label">Phase 4-fix: Bug Fixes (iter 1)</text>
    <text x="380" y="270" class="status-done">Done</text>
    <text x="420" y="270" class="dim">→ 2 high issues fixed</text>
  </g>

  <!-- Phase 5 -->
  <g class="line13">
    <text x="20" y="295" class="agent-name">fabric-devops</text>
    <text x="140" y="295" class="phase-label">Phase 5: Deployment Setup</text>
    <text x="380" y="295" class="status-done">Done</text>
    <text x="420" y="295" class="dim">→ Docker, CI/CD, .env</text>
  </g>

  <!-- Phase 6 -->
  <g class="line14">
    <text x="20" y="320" class="agent-name">fabric-docs</text>
    <text x="120" y="320" class="phase-label">Phase 6: Documentation</text>
    <text x="380" y="320" class="status-done">Done</text>
    <text x="420" y="320" class="dim">→ README, user guide, API docs</text>
  </g>

  <!-- Phase 7 -->
  <g class="line15">
    <text x="20" y="345" class="agent-name">fabric-pm</text>
    <text x="110" y="345" class="phase-label">Phase 7: Final Delivery</text>
    <text x="380" y="345" class="status-done">Done</text>
  </g>

  <!-- Separator -->
  <g class="line16">
    <text x="20" y="370" class="dim">───────────────────────────────────────────────────────────</text>
  </g>

  <!-- Summary -->
  <g class="line17">
    <text x="20" y="395" class="status-done" font-size="14" font-weight="bold">DELIVERED</text>
  </g>
  <g class="line18">
    <text x="20" y="418" class="file-path">18 docs</text>
    <text x="90" y="418" class="dim">│</text>
    <text x="100" y="418" class="file-path">24 source files</text>
    <text x="240" y="418" class="dim">│</text>
    <text x="250" y="418" class="file-path">47 tests</text>
    <text x="325" y="418" class="dim">│</text>
    <text x="335" y="418" class="file-path">Dockerfile + CI/CD</text>
  </g>

  <!-- Output files -->
  <g class="line19">
    <text x="20" y="448" class="dim">docs/ src/ tests/unit/ tests/e2e/ infra/ README.md</text>
    <text x="20" y="475" class="prompt">$</text>
    <rect x="35" y="464" width="8" height="16" fill="#c0caf5" opacity="0.7">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
